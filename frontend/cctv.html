<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCTV Wall — Embedded Crisis Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0f14;
      --card: #131a24;
      --border: rgba(255, 255, 255, 0.07);
      --text: #e8edf3;
      --muted: #5a6980;
      --accent: #e85d26;
      --green: #22c55e;
      --red: #ef4444;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ── Shell ── */
    #shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 10px 12px;
      gap: 8px;
    }

    /* ── Topbar ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .35
      }
    }

    .brand-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .page-title {
      font-size: 17px;
      font-weight: 800;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #chipStatus {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
    }

    /* ── Alert banner ── */
    #banner {
      flex-shrink: 0;
      padding: 9px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.03);
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 9px;
      transition: all .3s;
    }

    #banner.alert {
      background: rgba(239, 68, 68, .1);
      border-color: rgba(239, 68, 68, .35);
      color: #fca5a5;
      animation: flashB 1.8s ease-in-out infinite;
    }

    @keyframes flashB {

      0%,
      100% {
        border-color: rgba(239, 68, 68, .35)
      }

      50% {
        border-color: rgba(239, 68, 68, .75)
      }
    }

    #banner .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    #banner.alert .dot {
      background: var(--red);
      box-shadow: 0 0 7px var(--red);
    }

    /* ── Grid ── */
    #grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    @media(max-width:1100px) {
      #grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media(max-width:680px) {
      #grid {
        grid-template-columns: 1fr;
      }
    }

    /* ── Camera card ── */
    .cam {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: border-color .3s, box-shadow .3s;
    }

    .cam.alert {
      border-color: rgba(239, 68, 68, .5);
      box-shadow: 0 0 0 1px rgba(239, 68, 68, .15), inset 0 0 48px rgba(239, 68, 68, .04);
    }

    /* card header */
    .cam-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 11px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, .02);
      flex-shrink: 0;
    }

    .cam-id {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1px;
    }

    .cam-loc {
      font-size: 12px;
      font-weight: 700;
    }

    .cam-badge {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
    }

    .cam-badge.clear {
      background: rgba(34, 197, 94, .14);
      color: #86efac;
    }

    .cam-badge.caution {
      background: rgba(239, 68, 68, .18);
      color: #fca5a5;
    }

    /* feed */
    .cam-feed {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #060a0f;
      overflow: hidden;
    }

    .cam-feed video,
    .cam-feed img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* overlays */
    .cam-overlay {
      position: absolute;
      inset: 0;
      background: rgba(239, 68, 68, .07);
      pointer-events: none;
      display: none;
      z-index: 3;
    }

    .cam.alert .cam-overlay {
      display: block;
    }

    .cam-alert-chip {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(239, 68, 68, .85);
      color: #fff;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: .08em;
      padding: 3px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      display: none;
      z-index: 4;
    }

    .cam.alert .cam-alert-chip {
      display: block;
    }

    .cam-alert-msg {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5;
      background: rgba(239, 68, 68, 0.25);
      pointer-events: none;
      border: 4px solid var(--red);
      animation: alertPulse 1s infinite;
    }

    .cam.alert .cam-alert-msg {
      display: flex;
    }

    .cam-alert-msg span {
      font-size: 28px;
      font-weight: 900;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.8), 0 0 10px var(--red);
      text-align: center;
    }

    @keyframes alertPulse {
      0% { opacity: 1; border-color: var(--red); }
      50% { opacity: 0.7; border-color: rgba(239, 68, 68, 0.3); }
      100% { opacity: 1; border-color: var(--red); }
    }

    .cam-placeholder {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: #060a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--muted);
    }

    .cam-placeholder svg {
      opacity: .25;
    }

    .cam-placeholder span {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .05em;
    }

    /* AI pip */
    .ai-pip {
      position: absolute;
      bottom: 7px;
      right: 7px;
      background: rgba(0, 0, 0, .65);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 5px;
      padding: 2px 6px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .07em;
      color: var(--green);
      display: none;
    }

    .cam[data-ai="1"] .ai-pip {
      display: block;
    }

    /* sending indicator */
    .send-pip {
      position: absolute;
      bottom: 7px;
      left: 7px;
      background: rgba(0, 0, 0, .65);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 5px;
      padding: 2px 6px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .07em;
      color: #60a5fa;
      display: none;
    }

    .cam[data-sending="1"] .send-pip {
      display: block;
    }

    /* meta strip */
    .cam-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 11px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .cam-meta-l,
    .cam-meta-r {
      font-size: 10px;
      color: var(--muted);
    }

    .cam-meta-r strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: none;
      border-radius: 7px;
      padding: 7px 12px;
      font: 600 11px 'Inter', sans-serif;
      letter-spacing: .02em;
      cursor: pointer;
      transition: opacity .15s, transform .15s;
      text-decoration: none;
    }

    .btn:hover {
      opacity: .8;
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: rgba(255, 255, 255, .06);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, .12);
    }

    .btn-panic {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font: 800 10px 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-panic:hover {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
    }

    .btn-clear {
      background: rgba(34, 197, 94, 0.1);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 6px;
      padding: 4px 10px;
      font: 800 10px 'Inter', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      display: none; /* hidden by default, shown when alert is active */
    }
    .btn-clear:hover {
      background: #22c55e;
      color: #fff;
      border-color: #22c55e;
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
    }
    .cam.alert .btn-clear {
      display: block;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, .1);
      border-radius: 4px;
    }

    /* ── Drawer ── */
    #drawer {
      position: fixed; top: 0; right: -320px; width: 320px; height: 100%;
      background: var(--card); border-left: 1px solid var(--border);
      z-index: 100; transition: right .3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.5);
    }
    #drawer.open { right: 0; }
    .drawer-head { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .drawer-title { font-weight: 800; font-size: 14px; text-transform: uppercase; color: var(--muted); }
    .drawer-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .media-item {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px; cursor: pointer; transition: all 0.2s;
    }
    .media-item:hover { background: rgba(255,255,255,0.07); border-color: var(--accent); }
    .media-item .name { font-size: 12px; font-weight: 700; display: block; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; }
    .media-item .path { font-size: 10px; color: var(--muted); word-break: break-all; }
    
    .path-input-group { display: flex; gap: 6px; margin-bottom: 8px; }
    .path-input {
      flex: 1; background: #000; border: 1px solid var(--border);
      border-radius: 6px; color: #fff; padding: 6px 10px; font-size: 11px;
    }
  </style>
</head>

<body>
  <div id="shell">

    <header id="topbar">
      <div class="brand">
        <div class="brand-dot"></div>
        <span class="brand-label">Embedded Crisis Grid</span>
        <span style="color:rgba(255,255,255,.15);margin:0 2px">·</span>
        <span class="page-title">CCTV Wall</span>
      </div>
      <div class="topbar-right">
        <span id="chipStatus"></span>
        <button class="btn btn-ghost" id="btnLibrary">📁 Media Library</button>
        <button class="btn btn-ghost" id="btnWebcam">📷 Use My Webcam</button>
        <button class="btn btn-ghost" id="btnVideos">🎬 Use Demo Videos</button>
        <button class="btn btn-ghost" id="btnRefresh">↺ Refresh</button>
        <a class="btn btn-ghost" href="./index.html">← Command</a>
      </div>
    </header>

    <div id="banner">
      <div class="dot"></div>
      <span id="bannerText">Loading zone status…</span>
    </div>

    <main id="grid"></main>

  </div>

  <div id="drawer">
    <div class="drawer-head">
      <span class="drawer-title">Media Library</span>
      <button class="btn btn-ghost" id="btnCloseDrawer">✕</button>
    </div>
    <div class="drawer-body">
      <div class="path-input-group">
        <input type="text" class="path-input" id="libraryPath" placeholder="Folder path (e.g. C:\Videos)">
        <button class="btn btn-ghost" id="btnScan">Scan</button>
      </div>
      <div id="mediaList">
        <div style="text-align:center; padding:20px; color:var(--muted); font-size:11px;">
          Scan a folder to see videos
        </div>
      </div>
    </div>
  </div>

  <!--
    Hidden canvas used for frame capture.
    We capture at 320×240 — small enough to transfer fast, large enough for YOLO/heuristics.
  -->
  <canvas id="analyzeCanvas" width="320" height="240" style="display:none"></canvas>

  <script src="./cctv.js"></script>
</body>

</html>
